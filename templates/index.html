<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alerta SOS - CBTis 204</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333333;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #6b1c37; /* Guinda */
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #7f8c8d; /* Gris */
            font-size: 14px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #4a4a4a;
            font-size: 14px;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fafafa;
        }
        /* Contenedor del Botón SOS Especial */
        .sos-wrapper {
            margin: 30px auto;
            position: relative;
            width: 190px;
            height: 190px;
        }
        .btn-sos {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: #6b1c37; /* Guinda */
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            border: 8px solid #e2d3d8;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(107, 28, 55, 0.4);
            transition: background-color 0.3s, transform 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Color cuando se está dejando presionado */
        .btn-sos.holding {
            background-color: #d32f2f; /* Rojo brillante de carga */
            transform: scale(0.96);
            border-color: #ffcdd2;
        }
        .config-section {
            border-top: 2px dashed #dbdbdb;
            padding-top: 15px;
            margin-top: 25px;
            text-align: left;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background-color: #7f8c8d; /* Gris */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
            color: #6b1c37;
        }
        .instruction-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema de Alerta SOS</h1>
        <div class="subtitle">Plataforma de Seguridad Escolar Confidencial</div>

        <label for="matricula">Matrícula Escolar / No. de Control:</label>
        <input type="text" id="matricula" placeholder="Ingresa tu matrícula para activar la app">

        <label for="incidente">Tipo de Incidente / Reporte:</label>
        <select id="incidente">
            <option value="Médico / Accidente">Emergencia Médica / Accidente</option>
            <option value="Acoso / Bullying">Reporte de Acoso / Bullying</option>
            <option value="Riña / Pelea">Riña o Pelea en el plantel</option>
            <option value="Siniestro (Fuego/Sismo)">Siniestro (Fuego / Sismo)</option>
            <option value="Prueba de Sistema">Solo una Prueba de Sistema</option>
        </select>

        <label for="detalles">Ubicación aproximada dentro del plantel:</label>
        <input type="text" id="detalles" placeholder="Ej: Edificio B, Aula 4, Canchas...">

        <div class="sos-wrapper">
            <button class="btn-sos" id="sosButton">SOS</button>
        </div>
        <div class="instruction-text">Mantén presionado por 3 segundos continuos</div>

        <div id="status"></div>

        <div class="config-section">
            <h3 style="color: #4a4a4a; margin-bottom: 10px; font-size: 15px;">Contactos de Emergencia (Opcional)</h3>
            <input type="text" id="contact1" placeholder="Contacto 1 (Nombre o Teléfono)">
            <input type="text" id="contact2" placeholder="Contacto 2 (Nombre o Teléfono)">
            <input type="text" id="contact3" placeholder="Contacto 3 (Nombre o Teléfono)">
            <button class="btn-save" id="saveContacts">Guardar Configuración Completa</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sosButton = document.getElementById('sosButton');
            const saveButton = document.getElementById('saveContacts');
            const statusDiv = document.getElementById('status');

            // Recuperar datos guardados del almacenamiento del cel
            document.getElementById('matricula').value = localStorage.getItem('userMatricula') || '';
            document.getElementById('contact1').value = localStorage.getItem('contact1') || '';
            document.getElementById('contact2').value = localStorage.getItem('contact2') || '';
            document.getElementById('contact3').value = localStorage.getItem('contact3') || '';

            // Guardar configuración completa en el navegador
            saveButton.addEventListener('click', () => {
                const matValue = document.getElementById('matricula').value.trim();
                if(!matValue) {
                    statusDiv.style.color = "red";
                    statusDiv.textContent = "Por favor, ingresa tu matrícula para guardar.";
                    return;
                }
                localStorage.setItem('userMatricula', matValue);
                localStorage.setItem('contact1', document.getElementById('contact1').value);
                localStorage.setItem('contact2', document.getElementById('contact2').value);
                localStorage.setItem('contact3', document.getElementById('contact3').value);
                
                statusDiv.style.color = "green";
                statusDiv.textContent = "¡Datos y Matrícula guardados exitosamente!";
                setTimeout(() => { statusDiv.textContent = ""; }, 4000);
            });

            // LÓGICA DE LOS 3 SEGUNDOS DE PRESIÓN
            let holdTimer;
            const holdDuration = 3000; // 3 segundos en milisegundos

            function startHold(e) {
                e.preventDefault();
                const matriculaActual = document.getElementById('matricula').value.trim();
                
                // Si no hay matrícula, no dejamos hacer nada
                if (!matriculaActual) {
                    statusDiv.style.color = "red";
                    statusDiv.textContent = "¡ERROR: Debes registrar tu matrícula antes de usar el SOS!";
                    return;
                }

                sosButton.classList.add('holding');
                statusDiv.style.color = "#6b1c37";
                statusDiv.textContent = "Sostén presionado... (3s)";

                holdTimer = setTimeout(() => {
                    triggerSOS(matriculaActual);
                }, holdDuration);
            }

            function cancelHold() {
                if (holdTimer) {
                    clearTimeout(holdTimer);
                    sosButton.classList.remove('holding');
                    if (!statusDiv.textContent.includes("éxito") && !statusDiv.textContent.includes("ERROR")) {
                        statusDiv.style.color = "orange";
                        statusDiv.textContent = "Envío cancelado. Debes mantenerlo por 3 segundos.";
                    }
                }
            }

            // Detectar cuando presionan en computadoras y pantallas táctiles de cel
            sosButton.addEventListener('mousedown', startHold);
            sosButton.addEventListener('mouseup', cancelHold);
            sosButton.addEventListener('mouseleave', cancelHold);

            sosButton.addEventListener('touchstart', startHold);
            sosButton.addEventListener('touchend', cancelHold);

            // FUNCIÓN QUE DISPARA LA ALERTA REAL
            function triggerSOS(matricula) {
                sosButton.classList.remove('holding');
                
                if (!navigator.geolocation) {
                    statusDiv.style.color = "red";
                    statusDiv.textContent = "La geolocalización no es soportada por este celular.";
                    return;
                }

                const tipoIncidente = document.getElementById('incidente').value;
                const notasUbicacion = document.getElementById('detalles').value || "No especificada";

                statusDiv.style.color = "red";
                statusDiv.textContent = "¡Tiempo cumplido! Enviando alerta general...";

                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Enviar todos los datos juntos a Render y luego a Telegram
                    fetch('/enviar-alerta', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            latitud: lat,
                            longitud: lon,
                            incidente: tipoIncidente,
                            detalles_ubicacion: notasUbicacion,
                            matricula: matricula,
                            contacto1: localStorage.getItem('contact1') || 'No asignado',
                            contacto2: localStorage.getItem('contact2') || 'No asignado',
                            contacto3: localStorage.getItem('contact3') || 'No asignado'
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            statusDiv.style.color = "green";
                            statusDiv.textContent = "¡Alerta SOS enviada con éxito!";
                        } else {
                            statusDiv.style.color = "red";
                            statusDiv.textContent = "Error al despachar la alerta.";
                        }
                    })
                    .catch(error => {
                        statusDiv.style.color = "red";
                        statusDiv.textContent = "Error de conexión con el servidor.";
                    });

                }, () => {
                    statusDiv.style.color = "red";
                    statusDiv.textContent = "Enciende tu GPS para poder procesar el SOS.";
                });
            }
        });
    </script>
</body>
</html>
