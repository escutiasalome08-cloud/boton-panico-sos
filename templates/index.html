<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alerta SOS - CBTis 204</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333333;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #6b1c37; /* Guinda Institucional */
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #7f8c8d; /* Gris */
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-sos {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #6b1c37; /* Guinda */
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            border: 8px solid #e2d3d8;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(107, 28, 55, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 35px;
        }
        .btn-sos:active {
            transform: scale(0.95);
            background-color: #521429;
        }
        .config-section {
            border-top: 2px dashed #dbdbdb;
            padding-top: 20px;
            text-align: left;
        }
        .config-section h3 {
            color: #4a4a4a;
            margin-bottom: 15px;
            font-size: 16px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fafafa;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background-color: #7f8c8d; /* Gris Plata */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-save:hover {
            background-color: #6c7a7b;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema de Alerta SOS</h1>
        <div class="subtitle">Plataforma de Seguridad Escolar Confidencial</div>

        <button class="btn-sos" id="sosButton">SOS</button>

        <div class="config-section">
            <h3>Configurar Contactos de Emergencia</h3>
            <input type="text" id="contact1" placeholder="Contacto 1 (Nombre o Teléfono)">
            <input type="text" id="contact2" placeholder="Contacto 2 (Nombre o Teléfono)">
            <input type="text" id="contact3" placeholder="Contacto 3 (Nombre o Teléfono)">
            <button class="btn-save" id="saveContacts">Guardar Contactos</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="/estático/js/app.js"></script>
</body>
</html>
